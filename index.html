<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kusumala Diwakar 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#fff5f8,#ffe4ec,#fff5f8);
color:#7a2c4b;
text-align:center;
}

/* HERO */
.hero{
padding:70px 20px;
}

h1{
font-size:2.7rem;
color:#e75480;
}

.typing{
margin-top:15px;
font-size:1.2rem;
min-height:35px;
}

#countdown{
margin-top:10px;
color:#e75480;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#e75480;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#d94370;
box-shadow:0 8px 20px rgba(231,84,128,0.4);
transform:translateY(-2px);
}

/* ===== SLIDESHOW ===== */

.slideshow{
width:95%;
max-width:850px;
margin:40px auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.slide{
display:none;
}

.slide img{
width:100%;
height:auto;
max-height:75vh;
object-fit:contain;
border-radius:15px;
}

/* ===== GALLERY ===== */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.card{
background:white;
border-radius:18px;
padding:15px;
transition:0.4s;
box-shadow:
0 15px 35px rgba(0,0,0,0.12),
0 5px 15px rgba(231,84,128,0.15);
}

.card img{
width:100%;
height:auto;
max-height:500px;
object-fit:contain;
border-radius:12px;
}

/* Hover lift effect */
.card:hover{
transform:translateY(-8px);
box-shadow:
0 25px 50px rgba(0,0,0,0.18),
0 10px 25px rgba(231,84,128,0.25);
}

/* SECRET MESSAGE */
#secretMessage{
display:none;
margin:30px auto;
max-width:800px;
padding:25px;
background:#fff0f5;
border-radius:18px;
line-height:1.7;
box-shadow:0 15px 40px rgba(231,84,128,0.15);
}

/* FOOTER */
footer{
margin-top:40px;
padding:20px;
background:#fff0f5;
color:#e75480;
font-weight:bold;
}

</style>
</head>

<body>

<section class="hero">
<h1>🎉 Happy Birthday Kusumala Diwakar 🎂</h1>

<div class="typing" id="typing"></div>
<div id="countdown"></div>

<button class="btn" onclick="openSecret()">🔐 Open Secret</button>

<div id="secretMessage">
Low on photos, high on brotherhood. 📸➡️♾️ Happy Birthday to the guy who earned my respect the hard way and kept it. Grateful for you, man—let’s keep moving forward. 🚀🙌🦾
</div>
</section>

<!-- ===== SLIDESHOW ===== -->
<div class="slideshow">
<div class="slide"><img src="img1.jpeg"></div>
<div class="slide"><img src="img2.jpeg"></div>
<div class="slide"><img src="img3.jpeg"></div>
<div class="slide"><img src="img4.jpeg"></div>
</div>

<!-- ===== GALLERY ===== -->
<section class="gallery">
<div class="card"><img src="img1.jpeg"></div>
<div class="card"><img src="img2.jpeg"></div>
<div class="card"><img src="img3.jpeg">
<img src="img3.1.jpeg" alt=""></div>
<div class="card"><img src="img4.jpeg"></div>
</section>

<audio autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<footer>
Made with ❤️ by Sai Yashwanth
</footer>

<script>

/* CONFETTI */
setTimeout(()=>confetti({particleCount:200,spread:140}),800);

/* TYPING */
const text="March 26 — A special day for a real one. Happy Birthday Diwakar!";
let i=0;
(function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i++);
setTimeout(type,50);
}
})();

/* COUNTDOWN */
function nextBirthday(){
let now=new Date();
let year=now.getFullYear();
let b=new Date(year,2,26);
if(now>b) b=new Date(year+1,2,26);
return b;
}

const birthday=nextBirthday().getTime();

setInterval(()=>{
const now=new Date().getTime();
const d=birthday-now;

document.getElementById("countdown").innerHTML=
`🎂 ${Math.floor(d/(1000*60*60*24))}d 
${Math.floor((d%(1000*60*60*24))/(1000*60*60))}h 
${Math.floor((d%(1000*60*60))/(1000*60))}m 
${Math.floor((d%(1000*60))/1000)}s`;
},1000);

/* SLIDESHOW */
let index=0;
(function showSlides(){
let slides=document.getElementsByClassName("slide");
for(let i=0;i<slides.length;i++) slides[i].style.display="none";
index++;
if(index>slides.length) index=1;
slides[index-1].style.display="block";
setTimeout(showSlides,3500);
})();

/* PASSWORD */
function openSecret(){
let pass=prompt("Enter Secret Code:");
if(pass==="905202"){
document.getElementById("secretMessage").style.display="block";
confetti({particleCount:300,spread:150});
}else{
alert("Wrong Password 💔");
}
}

</script>

</body>

</html>
